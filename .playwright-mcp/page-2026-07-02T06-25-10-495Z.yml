      - generic [ref=f15e863]:
        - img "Inside Anas and Sons Jewellers" [ref=f15e866]
        - generic [ref=f15e868]:
          - paragraph [ref=f15e869]: "“In 1988, we opened our doors with a simple promise: honest gold, fair prices, and respect for every customer who walks in.”"
          - paragraph [ref=f15e871]: Three generations later, that promise still holds. What started as a small family shop has grown into Okhla's largest jewellery showroom, trusted by thousands of families for their weddings, celebrations, and everyday elegance.
          - paragraph [ref=f15e872]: Every piece in our collection, from Turkish gold designs to certified diamond sets, carries the care and precision that comes from nearly 40 years of experience. We do not simply sell jewellery. We help families find pieces that become part of their story.
      - generic [ref=f15e873]:
